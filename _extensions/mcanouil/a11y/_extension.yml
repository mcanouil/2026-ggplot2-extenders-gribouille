title: Reveal.js A11y
author: Mickaël Canouil
version: 0.2.1
quarto-required: '>=1.9.36'
source: mcanouil/quarto-revealjs-a11y@0.2.1
source-type: github
contributes:
  revealjs-plugins:
    - name: RevealjsA11y
      script:
        - a11y.js
      stylesheet:
        - a11y.css
      config:
        revealjs-a11y: true
